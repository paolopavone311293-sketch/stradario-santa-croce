<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d4af37" />
  <title>Stradario Santa Croce</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #202124;
      color: #fff;
    }
    .container {
      max-width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #d4af37;
      color: #000;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .menu-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #000;
    }
    .search-box {
      padding: 10px 15px;
      margin: 10px;
      border-radius: 20px;
      border: none;
      font-size: 16px;
      background: #fff;
      color: #000;
    }
    .list-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .card {
      background: #2d2d2d;
      margin: 8px 10px;
      padding: 12px;
      border-radius: 8px;
      border-left: 5px solid #d4af37;
      cursor: pointer;
    }
    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .card-info {
      font-size: 14px;
      color: #ddd;
      margin: 4px 0;
    }
    .menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }
    .menu-overlay.active {
      display: block;
    }
    .menu-panel {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100vh;
      background: #1e1e1e;
      z-index: 1000;
      transition: left 0.3s;
      overflow-y: auto;
    }
    .menu-panel.active {
      left: 0;
    }
    .menu-header {
      background: #d4af37;
      color: #000;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .menu-item {
      color: #fff;
      padding: 15px 20px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      font-size: 18px;
    }
    .menu-item:hover {
      background: #333;
    }
    .modal-content .menu-item {
      color: #000;
    }
    .modal-content .menu-item:hover {
      background: #f0f0f0;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1001;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: #fff;
      color: #000;
      border-radius: 15px;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    .btn-primary {
      background: #d4af37;
      color: #000;
    }
    .btn-secondary {
      background: #444;
      color: #fff;
    }
    .btn-danger {
      background: #ff4444;
      color: #fff;
    }
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: #888;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
      <h1>📍 Stradario Santa Croce</h1>
    </div>
    <input type="text" class="search-box" id="search" placeholder="Cerca via, città o zona..." onkeyup="filterStrade()" />
    <div class="list-container" id="list"></div>
  </div>

  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
  <div class="menu-panel" id="menuPanel">
    <div class="menu-header">📍 Stradario Santa Croce v1.0</div>
    <div class="menu-item" onclick="openAddModal()">➕ Nuova Via</div>
    <div class="menu-item" onclick="openLoginModal()">🔐 Accedi Admin</div>
    <div class="menu-item" onclick="exportExcel()">📊 Esporta Excel</div>
    <div style="flex: 1"></div>
    <div class="menu-item" onclick="toggleMenu()">✕ Chiudi</div>
  </div>

  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-title" id="addModalTitle">Nuova Via</div>
      <div class="form-group">
        <label>Colonna A (es: VIA DELL')</label>
        <input type="text" id="colonnaA" placeholder="VIA, VICOLO, PIAZZALE..." />
      </div>
      <div class="form-group">
        <label>Colonna B</label>
        <input type="text" id="colonnaB" placeholder="del, della, dell', degli, di..." />
      </div>
      <div class="form-group">
        <label>Via</label>
        <input type="text" id="via" placeholder="Nome della via" />
      </div>
      <div class="form-group">
        <label for="zona">Zona</label>
        <select id="zona" name="zona" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px;">
          <option value="">-- Seleziona Zona --</option>
        </select>
      </div>
      <div class="form-group">
        <label for="numeri">Numeri civici</label>
        <input type="text" id="numeri" name="numeri" placeholder="Es: DAL 1 AL 50, TUTTI..." />
      </div>
      <div class="form-group">
        <label for="citta">Città</label>
        <select id="citta" name="citta" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px;">
          <option value="">-- Seleziona Città --</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="saveStrada()">💾 Salva</button>
      <button class="btn btn-secondary" onclick="closeAddModal()">Annulla</button>
      <div id="deleteBtn"></div>
    </div>
  </div>

  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-title">🔐 Accesso Amministratore</div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="Inserisci password..." onkeypress="if(event.key==='Enter') loginAdmin()" />
      </div>
      <button class="btn btn-primary" onclick="loginAdmin()">Accedi</button>
      <button class="btn btn-secondary" onclick="closeLoginModal()">Annulla</button>
    </div>
  </div>

  <div class="modal" id="optionsModal">
    <div class="modal-content">
      <div class="menu-item" onclick="editStrada()">✏️ Modifica</div>
      <div class="menu-item" onclick="openMaps()">📍 Apri Google Maps</div>
      <div class="menu-item" onclick="closeOptionsModal()">❌ Annulla</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://zltsdiaefuokeuuwdxfp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_TF4NSM-LZVfT-dVPeSCdPA_dK0flzt6";
    const ADMIN_PASSWORD = "Copernico7";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allStrade = [];
    let filteredStrade = [];
    let isAdmin = false;
    let editingId = null;
    let selectedStrada = null;
    let allZone = [];
    let allCitta = [];

    async function loadStrade() {
      try {
        const { data, error } = await supabaseClient.from("strade").select("*").order("nome_completo");
        if (error) throw error;
        allStrade = data || [];

        // Estrai zone e città uniche
        allZone = [...new Set(allStrade.map(s => s.zona).filter(z => z))].sort();
        allCitta = [...new Set(allStrade.map(s => s.citta).filter(c => c))].sort();

        // Popola i dropdown
        populateDropdowns();
        filterStrade();
      } catch (error) {
        console.error("Errore:", error);
        document.getElementById("list").innerHTML = '<div class="no-results">Errore di connessione a Supabase</div>';
      }
    }

    function populateDropdowns() {
      const zonaSelect = document.getElementById("zona");
      const cittaSelect = document.getElementById("citta");

      // Popola zone
      allZone.forEach(z => {
        const option = document.createElement("option");
        option.value = z;
        option.textContent = z;
        zonaSelect.appendChild(option);
      });

      // Popola città
      allCitta.forEach(c => {
        const option = document.createElement("option");
        option.value = c;
        option.textContent = c;
        cittaSelect.appendChild(option);
      });
    }

    function filterStrade() {
      const search = document.getElementById("search").value.toLowerCase().trim();
      if (!search) {
        filteredStrade = allStrade;
        renderStrade();
        return;
      }

      const searchClean = search.replace(/\s/g, "").replace(/-/g, "");
      filteredStrade = allStrade.filter((s) => {
        const nome = (s.nome_completo || "").toLowerCase();
        const via = (s.via || "").toLowerCase();
        const citta = (s.citta || "").toLowerCase();
        const zona = (s.zona || "").toLowerCase().replace(/\s/g, "").replace(/-/g, "");
        const zonaNum = zona.match(/^(\d+)/)?.[1] || "";

        // Se la ricerca è solo numeri, cerca solo per numero zona (esatto)
        if (/^\d+$/.test(searchClean)) {
          return zonaNum === searchClean;
        }

        // Altrimenti cerca per nome/via/città/zona
        return nome.includes(search) || via.includes(search) || citta.includes(search) || zona.includes(searchClean);
      });
      renderStrade();
    }

    function renderStrade() {
      const list = document.getElementById("list");
      if (filteredStrade.length === 0) {
        list.innerHTML = '<div class="no-results">Nessuna strada trovata</div>';
        return;
      }
      list.innerHTML = filteredStrade.map((s) => `
        <div class="card" onclick="selectStrada('${s.id}')">
          <div class="card-title">${s.nome_completo || s.via}</div>
          <div class="card-info">📍 ${s.zona || "-"}</div>
          <div class="card-info">🔢 ${s.numeri || "-"}</div>
          <div class="card-info">🏠 ${s.citta || "-"}</div>
        </div>
      `).join("");
    }

    function selectStrada(id) {
      selectedStrada = allStrade.find((s) => s.id == id);
      document.getElementById("optionsModal").classList.add("active");
    }

    function openMaps() {
      if (!selectedStrada) return;
      const indirizzo = `${selectedStrada.nome_completo || selectedStrada.via}, ${selectedStrada.citta}`;
      window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(indirizzo)}`, "_blank");
      closeOptionsModal();
    }

    function loginAdmin() {
      const pwd = document.getElementById("adminPassword").value;
      if (pwd === ADMIN_PASSWORD) {
        isAdmin = true;
        closeLoginModal();
        alert("✅ Accesso riuscito!");
      } else {
        alert("❌ Password errata");
      }
    }

    function openAddModal() {
      if (!isAdmin) {
        openLoginModal();
        return;
      }
      editingId = null;
      document.getElementById("colonnaA").value = "";
      document.getElementById("colonnaB").value = "";
      document.getElementById("via").value = "";
      document.getElementById("zona").value = "";
      document.getElementById("numeri").value = "";
      document.getElementById("citta").value = "";
      document.getElementById("addModalTitle").textContent = "Nuova Via";
      document.getElementById("deleteBtn").innerHTML = "";
      document.getElementById("addModal").classList.add("active");
      toggleMenu();
    }

    function editStrada() {
      if (!selectedStrada) return;
      if (!isAdmin) {
        alert("❌ Accedi come admin per modificare");
        closeOptionsModal();
        return;
      }
      editingId = selectedStrada.id;
      document.getElementById("colonnaA").value = selectedStrada.colonna_a || "";
      document.getElementById("colonnaB").value = selectedStrada.colonna_b || "";
      document.getElementById("via").value = selectedStrada.via || "";
      document.getElementById("zona").value = selectedStrada.zona || "";
      document.getElementById("numeri").value = selectedStrada.numeri || "";
      document.getElementById("citta").value = selectedStrada.citta || "";
      document.getElementById("addModalTitle").textContent = "Modifica Via";
      document.getElementById("deleteBtn").innerHTML = '<button class="btn btn-danger" onclick="deleteStrada()">🗑️ Elimina</button>';
      document.getElementById("addModal").classList.add("active");
      closeOptionsModal();
    }

    async function saveStrada() {
      if (!isAdmin) return;
      const via = document.getElementById("via").value.trim();
      const citta = document.getElementById("citta").value.trim();
      if (!via || !citta) {
        alert("Compila almeno Via e Città");
        return;
      }
      const data = {
        colonna_a: document.getElementById("colonnaA").value.trim(),
        colonna_b: document.getElementById("colonnaB").value.trim(),
        via: via,
        zona: document.getElementById("zona").value.trim(),
        numeri: document.getElementById("numeri").value.trim(),
        citta: citta,
        nome_completo: `${document.getElementById("colonnaA").value.trim()} ${document.getElementById("colonnaB").value.trim()} ${via}`.trim(),
      };
      try {
        if (editingId) {
          const { error } = await supabaseClient.from("strade").update(data).eq("id", editingId);
          if (error) throw error;
        } else {
          const { error } = await supabaseClient.from("strade").insert([data]);
          if (error) throw error;
        }
        closeAddModal();
        loadStrade();
        alert("✅ Salvato!");
      } catch (error) {
        alert("❌ Errore: " + error.message);
      }
    }

    async function deleteStrada() {
      if (!isAdmin || !editingId) return;
      if (!confirm("Sei sicuro? Non si può annullare.")) return;
      try {
        const { error } = await supabaseClient.from("strade").delete().eq("id", editingId);
        if (error) throw error;
        closeAddModal();
        loadStrade();
        alert("✅ Eliminato!");
      } catch (error) {
        alert("❌ Errore: " + error.message);
      }
    }

    function exportExcel() {
      let csv = "VIA,ZONA,NUMERI,CITTA\n";
      allStrade.forEach((s) => {
        csv += `"${(s.via || "").replace(/"/g, '""')}","${(s.zona || "").replace(/"/g, '""')}","${(s.numeri || "").replace(/"/g, '""')}","${(s.citta || "").replace(/"/g, '""')}"\n`;
      });
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", "Stradario.csv");
      link.style.visibility = "hidden";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function toggleMenu() {
      document.getElementById("menuPanel").classList.toggle("active");
      document.getElementById("menuOverlay").classList.toggle("active");
    }

    function openLoginModal() {
      document.getElementById("adminPassword").value = "";
      document.getElementById("loginModal").classList.add("active");
    }

    function closeLoginModal() {
      document.getElementById("loginModal").classList.remove("active");
    }

    function closeAddModal() {
      document.getElementById("addModal").classList.remove("active");
      editingId = null;
    }

    function closeOptionsModal() {
      document.getElementById("optionsModal").classList.remove("active");
    }

    loadStrade();
  </script>
</body>
</html>
